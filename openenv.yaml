spec_version: 1
name: ai-autonomous-company-simulator
type: space
version: "1.0.0"
description: OpenEnv-compatible model hub for the AI Autonomous Company Simulator.
runtime:
  sdk: fastapi
  app: app:app
  port: 7860
graders:
  - name: revenue_growth
    entrypoint: graders:revenue_growth
  - name: user_growth
    entrypoint: graders:user_growth
  - name: capital_safety
    entrypoint: graders:capital_safety
  - name: cost_reduction
    entrypoint: graders:cost_reduction
  - name: satisfaction_floor
    entrypoint: graders:satisfaction_floor
  - name: quality_floor
    entrypoint: graders:quality_floor
  - name: normalized_reward
    entrypoint: graders:normalized_reward
  - name: retention_proxy
    entrypoint: graders:retention_proxy
  - name: bankruptcy_avoidance
    entrypoint: graders:bankruptcy_avoidance
tasks:
  - id: companiesim_growth_001
    task_id: companiesim_growth_001
    difficulty: easy
    title: Revenue Growth Sprint
    description: Maximize 30-day revenue and user growth while avoiding bankruptcy.
    objective: Increase revenue and active users over the episode while keeping capital non-negative.
    success_criteria: Revenue growth >= 0.18, user growth >= 0.12, and capital remains non-negative.
    score_range:
      min: 0.0
      max: 1.0
    reset_params:
      task_id: companiesim_growth_001
      difficulty: easy
    graders:
      - name: revenue_growth
        metric: revenue_growth_pct
        weight: 0.5
        direction: maximize
        threshold: 0.18
        deterministic: true
        score_min: 0.0
        score_max: 1.0
      - name: user_growth
        metric: active_user_growth_pct
        weight: 0.3
        direction: maximize
        threshold: 0.12
        deterministic: true
        score_min: 0.0
        score_max: 1.0
      - name: capital_safety
        metric: capital_non_negative
        weight: 0.2
        direction: maximize
        threshold: 1.0
        deterministic: true
        score_min: 0.0
        score_max: 1.0
    grader:
      name: revenue_growth
      metric: revenue_growth_pct
      weight: 0.5
      direction: maximize
      threshold: 0.18
      deterministic: true
      score_min: 0.0
      score_max: 1.0
  - id: companiesim_efficiency_002
    task_id: companiesim_efficiency_002
    difficulty: medium
    title: Cost Efficiency Run
    description: Reduce operational costs while maintaining customer satisfaction and quality.
    objective: Reduce operational costs without dropping customer satisfaction and product quality below safe floors.
    success_criteria: Cost reduction >= 0.10, satisfaction >= 0.45, and quality >= 0.45 (all normalized to 0..1 scores).
    score_range:
      min: 0.0
      max: 1.0
    reset_params:
      task_id: companiesim_efficiency_002
      difficulty: medium
    graders:
      - name: cost_reduction
        metric: operational_cost_reduction_pct
        weight: 0.45
        direction: maximize
        threshold: 0.1
        deterministic: true
        score_min: 0.0
        score_max: 1.0
      - name: satisfaction_floor
        metric: min_customer_satisfaction
        weight: 0.35
        direction: maximize
        threshold: 45.0
        deterministic: true
        score_min: 0.0
        score_max: 1.0
      - name: quality_floor
        metric: min_product_quality
        weight: 0.2
        direction: maximize
        threshold: 45.0
        deterministic: true
        score_min: 0.0
        score_max: 1.0
    grader:
      name: cost_reduction
      metric: operational_cost_reduction_pct
      weight: 0.45
      direction: maximize
      threshold: 0.1
      deterministic: true
      score_min: 0.0
      score_max: 1.0
  - id: companiesim_balanced_003
    task_id: companiesim_balanced_003
    difficulty: hard
    title: Balanced Strategy Challenge
    description: Balance growth, retention, and risk control across a 30-day episode.
    objective: Maintain balanced long-horizon performance with strong reward, retention, and bankruptcy avoidance.
    success_criteria: Normalized reward >= 0.55, retained users >= 0.30, and bankruptcy avoided.
    score_range:
      min: 0.0
      max: 1.0
    reset_params:
      task_id: companiesim_balanced_003
      difficulty: hard
    graders:
      - name: normalized_reward
        metric: episode_normalized_reward
        weight: 0.4
        direction: maximize
        threshold: 0.55
        deterministic: true
        score_min: 0.0
        score_max: 1.0
      - name: retention_proxy
        metric: retained_user_ratio
        weight: 0.3
        direction: maximize
        threshold: 0.3
        deterministic: true
        score_min: 0.0
        score_max: 1.0
      - name: bankruptcy_avoidance
        metric: bankruptcy_avoidance
        weight: 0.3
        direction: maximize
        threshold: 1.0
        deterministic: true
        score_min: 0.0
        score_max: 1.0
    grader:
      name: normalized_reward
      metric: episode_normalized_reward
      weight: 0.4
      direction: maximize
      threshold: 0.55
      deterministic: true
      score_min: 0.0
      score_max: 1.0
